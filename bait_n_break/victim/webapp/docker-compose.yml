services:
  webapp:
    build: .
    ports:
      - "${TARGET_PORT:-8080}:5000"
    volumes:
      - ../../../.state/bait/backups:/bait/backups:ro
      - ../../../.state/bait/secrets:/bait/secrets:ro
      - ../../../.state/bait/deception:/bait/deception
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=production_db
      - MYSQL_USER=webapp
      - MYSQL_PASSWORD=webapp123
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

  ssh-decoy:
    image: lscr.io/linuxserver/openssh-server:latest
    environment:
      - PUID=1000
      - PGID=1000
      - PASSWORD_ACCESS=true
      - USER_NAME=admin
      - USER_PASSWORD=admin123
      - SUDO_ACCESS=true
    ports:
      - "2222:2222"
    restart: unless-stopped

  ftp-decoy:
    image: fauria/vsftpd
    environment:
      - FTP_USER=admin
      - FTP_PASS=admin123
      - PASV_ADDRESS=127.0.0.1
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    restart: unless-stopped

  # --- CVE Training Services ---

  apache-41773:
    build:
      context: .
      dockerfile: cve-services/apache-2.4.49/Dockerfile
    ports:
      - "${BNB_CVE_APACHE_41773_PORT:-8081}:80"
    restart: unless-stopped

  shellshock:
    build:
      context: .
      dockerfile: cve-services/shellshock/Dockerfile
    ports:
      - "${BNB_CVE_SHELLSHOCK_PORT:-8082}:80"
    restart: unless-stopped

  proftpd-3306:
    build:
      context: .
      dockerfile: cve-services/proftpd-1.3.5/Dockerfile
    ports:
      - "${BNB_CVE_PROFTPD_PORT:-2122}:21"
      - "21300-21310:21300-21310"
    restart: unless-stopped

  webmin-15107:
    build:
      context: .
      dockerfile: cve-services/webmin-1.890/Dockerfile
    ports:
      - "${BNB_CVE_WEBMIN_PORT:-10000}:10000"
    restart: unless-stopped

  tomcat-ghostcat:
    build:
      context: .
      dockerfile: cve-services/tomcat-ghostcat/Dockerfile
    ports:
      - "${BNB_CVE_TOMCAT_HTTP_PORT:-8083}:8080"
      - "${BNB_CVE_TOMCAT_AJP_PORT:-8009}:8009"
    restart: unless-stopped

volumes:
  db-data:
